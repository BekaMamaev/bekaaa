<!DOCTYPE html> <!--Задает тип документа, здесь это html-->
<html lang="en"> <!--Задает основной язык документа-->
<head>
   <meta charset="UTF-8"> <!--формат кодирования-->
   <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--вид сайта, размер соответсвенно с устройством и масштаб-->
   <title>My Resume</title> <!--Название самого сайта-->
</head>
<body> <!--тег а - для гиперссылок, тег img для медиафайлов, по типу картинок-->
    <a href="https://www.google.com" target="_blank">Ссылка на google.com + в новом окне</a> <!--href - ссылка на сайт, target выводит на новую влкдаку-->

    <p><a href="#section1">Перейти к разделу Резюме</a></p>
    <p><a href="#bottom">Прокрутить вниз</a></p>

    <h2 id="section1">Раздел Резюме</h2> <!--здесь id - уникальный идентификатор для строки-->

    <img src="./madara.png" alt="Мое изображение" width="350" length="350">
    <p><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Albert_Einstein_Head_cleaned.jpg/960px-Albert_Einstein_Head_cleaned.jpg" 
    alt="Альберт Эйнштейн" width="400" length="300"></p> <!--src - source для картинки, alt это 
                                                          название медиафайла на сайте, ширина и длина картинки в пикселях соответсвенно-->

    <h3 id="bottom">Нижняя часть страницы</h3>
</body>
</html>
